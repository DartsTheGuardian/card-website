<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DartsTheGuardian - Profile card</title>
    <link rel="stylesheet" href="./Ressources/CSS/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" type="image/x-icon" href="./Ressources/Images/favicon.ico">
    <link rel="stylesheet" href="https://use.typekit.net/lhh6glc.css">
</head>

<body>
    <div class="profile-card">
        <input type="checkbox" id="flip-toggle" hidden>

        <div class="card">
            <label for="flip-toggle" class="face front-face">
                <img src="./Ressources/Images/FrontCard.png">
            </label>

            <label for="flip-toggle" class="face back-face">
                <img src="./Ressources/Images/BackCard.png">
            </label>
        </div>

        <div class="links" id="links">
            <button class="square first" onclick="window.open('https://dartstheguardian.itch.io/dressink', 
            '_blank')">

                <button class="square second" onclick="window.open('https://dartstheguardian.itch.io/the-light-bearer', 
            '_blank')">

                    <button class="square third" onclick="window.open('https://dartstheguardian.itch.io/rgb', 
            '_blank')">

                        <button class="square fourth" onclick="window.open('https://www.artstation.com/artwork/oJ1Q5q', 
            '_blank')">

                            <button class="square fifth" onclick="window.open('https://www.artstation.com/artwork/rld2w5', 
            '_blank')">
        </div>

        <div class="description">
            <p class="first">
                <b style="font-size:40px">Dress'Ink</b>
                <br>Android application made for the Louvre-Lens Week-end 2025</br>
            </p>
            <p class="second">
                <b style="font-size:40px">The Light Bearer</b>
                <br>Be the Light in their darkness!</br>
            </p>
            <p class="third">
                <b style="font-size:40px">Randomly Generated Bastille (RGB)</b>
                <br>Dive deeper into this colourful dungeon!</br>
            </p>
            <p class="fourth">
                <b style="font-size:40px">Médichament</b>
                <br>Global Game Jam 2024</br>
            </p>
            <p class="fifth">
                <b style="font-size:40px">Floating Island</b>
                <br>3D Project using Blender and Substance Painter</br>
            </p>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
